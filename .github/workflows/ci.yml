name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: lib scripts tests

  lint-shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shfmt
        uses: luizm/action-shfmt@1.1.0
        with:
          # Indent with 2 spaces, switch-case indent, binary operators at line start
          EXTRA_FLAGS: -i 2 -ci -bn

  unit-tests:
    name: bats unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run unit tests
        run: ./scripts/test-unit.sh --tap

  integration-tests:
    name: bats integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run integration tests
        uses: addnab/docker-run-action@v3
        with:
          image: docker:dind
          options: --privileged
          run: |
            apk add --no-cache bash git
            git clone https://github.com/bats-core/bats-core.git /tmp/bats
            /tmp/bats/install.sh /usr/local
            bats --version
            cd "${GITHUB_WORKSPACE}"
            ./scripts/test-integration.sh

  doctor:
    name: project structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify structure
        run: ./scripts/lint.sh doctor
